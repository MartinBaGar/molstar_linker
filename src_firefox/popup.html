<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mol* Linker</title>
  
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <div class="header">
    <span class="icon">🧬</span>
    <h2>Mol* Linker</h2>
  </div>

  <label>Active Configuration</label>
  <select id="preset-select">
    </select>
  
  <button id="apply-preset" class="primary">Apply & Reload Tab</button>
  
  <span id="status"></span>

  <hr>

  <label for="file-upload" class="btn-upload secondary">
    ⬆️ Import JSON File
  </label>
  <input type="file" id="file-upload" accept=".json">

  <button id="open-options" class="secondary">⚙️ Open Advanced Studio</button>

    <div id="custom-domain-prompt" style="display: none; padding: 16px; background-color: #f6f8fa; border-top: 1px solid #d0d7de; text-align: center;">
      <p style="margin: 0 0 10px 0; font-size: 13px; color: #57606a;">
        Want to use Mol* Linker here?
      </p>
      <button id="enable-domain-btn" class="primary" style="width: 100%; background-color: #0969da;">
        Enable on this domain
      </button>
    </div>

  </div> <script src="permissions.js"></script>
  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
